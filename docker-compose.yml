services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  web:
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_ENABLE_DOWNLOADS: "1"
        # Set to "0" on low-RAM hosts (e.g. a 1GB free-tier VPS) to hide bg-remove.
        NEXT_PUBLIC_ENABLE_HEAVY_WORKER_TOOLS: "${NEXT_PUBLIC_ENABLE_HEAVY_WORKER_TOOLS:-1}"
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_ENABLE_DOWNLOADS: "1"
      NEXT_PUBLIC_ENABLE_HEAVY_WORKER_TOOLS: "${NEXT_PUBLIC_ENABLE_HEAVY_WORKER_TOOLS:-1}"
      REDIS_URL: redis://redis:6379/0
      STORAGE_PATH: /data/storage
      MAX_FILE_SIZE_MB: 100
      MAX_CONCURRENT_JOBS: 2
      JOB_TTL_HOURS: 24
      WORKER_API_URL: http://worker:8000
    volumes:
      - storage_data:/data/storage
    depends_on:
      - redis

  worker:
    restart: unless-stopped
    build:
      context: ./services/worker
      dockerfile: Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      STORAGE_DIR: /data/storage
      MAX_CONCURRENT_JOBS: 2
      JOB_TTL_HOURS: 24
      # Set on the host (or in a .env next to this file) to authenticate
      # yt-dlp for login-gated content / cloud-IP verification checks.
      COOKIES_FILE: "${COOKIES_FILE:-}"
    volumes:
      - storage_data:/data/storage
      # Not read-only: yt-dlp rewrites the file to persist refreshed session cookies.
      - ./services/worker/cookies.txt:/app/cookies.txt
    depends_on:
      - redis

volumes:
  redis_data:
  storage_data:
